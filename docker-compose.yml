name: pharmacy-system

services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: pharmacy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ab123168
      MYSQL_DATABASE: pharmacy_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pab123168"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: pharmacy-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pharmacy_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ab123168
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: pharmacy-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: pharmacy-admin
    restart: unless-stopped
    ports:
      - "9527:9527"
    depends_on:
      - backend

volumes:
  mysql_data:
